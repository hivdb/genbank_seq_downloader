# Base directory for all downloaded and processed files.
db_path: '.'

# Release label used as a subfolder name (e.g. 2026-02-15).
date: "2026-02-15"

# Prefix for GenBank viral files on the NCBI FTP server.
gb_file_prefix: gbvrl

# Subfolders under <db_path> for raw downloads and processed outputs.
download_folder: downloads
processed_folder: processed

# Number of parallel processes for downloading and processing files.
# Uncomment and set a value to override; defaults to all available CPUs.
num_processes: 3

# SARS-CoV-2 records are always excluded from all outputs.
# Taxonomy terms used to identify and skip them (case-insensitive match).
sars2_taxonomy_terms:
  - Severe acute respiratory syndrome coronavirus 2

# If true, writes extracted sequences to <processed_folder>/<date>/records/<file>.seq.gz.
write_selected_records: true

# Whether to extract records and write metadata.csv / records/.
# If false, only all_records.csv is written.
extract: true

# Query terms are passed via CLI (--query), not set here.
# If --query is given, only matching records are written to metadata.csv.
# If --query is omitted, all non-SARS-CoV-2 records are written to metadata.csv.
# Example: --query HIV-1

# Common-name to taxonomy string mapping.
